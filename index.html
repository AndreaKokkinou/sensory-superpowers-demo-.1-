<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand-as-Mouse: Sensory Augmentation Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; color: white; font-family: sans-serif; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; cursor: none; }
        canvas { display: block; }
        .video-preview {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            border: 2px solid #3b82f6;
            border-radius: 8px;
            transform: scaleX(-1);
            background: #000;
            z-index: 10;
            object-fit: cover;
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.9);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            max-width: 340px;
            z-index: 20;
        }
        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .btn-active { pointer-events: auto; }
        #debug-log {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: monospace;
            font-size: 10px;
            color: #94a3b8;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            max-width: 300px;
            pointer-events: none;
        }
    </style>

<body>

<div id="canvas-container">
    <canvas id="gameCanvas" width="1022" height="424"></canvas>
    
    <div class="ui-overlay">
        <h1 class="text-xl font-bold mb-2">Hand-as-Mouse Sensory Demo</h1>
        
        <div id="setup-controls" class="space-y-4 btn-active">
            <div class="flex items-center mb-1">
                <span id="tracking-status" class="status-dot bg-yellow-500" style="background-color: rgb(34, 197, 94);"></span>
                <span id="status-text">Tracking Hand</span>
            </div>
            
            <p id="error-msg" class="text-xs text-red-400 font-bold hidden p-2 bg-red-900/20 rounded border border-red-500"></p>
            
            <button id="request-perms" class="w-full bg-blue-600 hover:bg-blue-500 text-white px-4 py-4 rounded font-bold transition-all shadow-lg active:scale-95 border-b-4 border-blue-800 hidden">
                CLICK TO START CAMERA
            </button>
            
            <button id="start-audio" class="w-full bg-slate-700 text-white px-4 py-2 rounded font-bold bg-green-700" disabled="">SENSORS ONLINE</button>

            <button id="download-app" class="w-full text-emerald-400 border border-emerald-500/50 hover:bg-emerald-500/10 px-4 py-2 rounded text-xs font-bold transition-colors">
                💾 DOWNLOAD sensory-demo.html
            </button>
        </div>

        <div id="game-info" class="mt-4 text-sm text-slate-400 space-y-1">
            <p>🖐️ Hand = Aim</p>
            <p>✊ Fist = Shoot</p>
        </div>
        
        <div id="score-display" class="mt-4 text-3xl font-mono text-blue-400">Score: 200</div>
    </div>

    <video id="input-video" class="video-preview" autoplay="" playsinline="" muted=""></video>
    <div id="debug-log">Log: Audio engine started.</div>
</div>

<script>
    const videoElement = document.getElementById('input-video');
    const canvasElement = document.getElementById('gameCanvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusDot = document.getElementById('tracking-status');
    const statusText = document.getElementById('status-text');
    const scoreDisplay = document.getElementById('score-display');
    const startBtn = document.getElementById('start-audio');
    const permBtn = document.getElementById('request-perms');
    const errorMsg = document.getElementById('error-msg');
    const downloadBtn = document.getElementById('download-app');
    const debugLog = document.getElementById('debug-log');

    function log(msg) {
        debugLog.innerText = "Log: " + msg;
        console.log(msg);
    }

    let score = 0;
    let handPos = { x: 0.5, y: 0.5 };
    let isFist = false;
    let wasFist = false;
    let targets = [];
    let jitter = 0;
    let lastHandPos = { x: 0.5, y: 0.5 };
    let audioStarted = false;
    let cameraActive = false;
    let handDetected = false;

    let audioCtx, jitterOsc, jitterGain, jitterFilter;
    let lockOsc, lockGain;
    let searchOsc, searchGain;

    downloadBtn.onclick = () => {
        const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'sensory-demo.html'; 
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };

    function initAudio() {
        if (audioStarted) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // Calmer sound: soft triangle tone through a low-pass filter.
            jitterOsc = audioCtx.createOscillator();
            jitterOsc.type = 'triangle';

            jitterFilter = audioCtx.createBiquadFilter();
            jitterFilter.type = 'lowpass';
            jitterFilter.frequency.value = 600;
            jitterFilter.Q.value = 0.7;

            jitterGain = audioCtx.createGain();
            jitterGain.gain.value = 0.02;

            jitterOsc.connect(jitterFilter);
            jitterFilter.connect(jitterGain);
            jitterGain.connect(audioCtx.destination);
            jitterOsc.start();

            // "Lock-on" cue: a very soft sine that fades in only when aiming at a target.
            lockOsc = audioCtx.createOscillator();
            lockOsc.type = 'sine';
            lockOsc.frequency.value = 880;
            lockGain = audioCtx.createGain();
            lockGain.gain.value = 0.0;
            lockOsc.connect(lockGain);
            lockGain.connect(audioCtx.destination);
            lockOsc.start();

            // "Search / out-of-frame" cue: a slow, low pulse only when no hand is detected.
            searchOsc = audioCtx.createOscillator();
            searchOsc.type = 'sine';
            searchOsc.frequency.value = 2.0; // slow pulsing
            searchGain = audioCtx.createGain();
            searchGain.gain.value = 0.0;
            searchOsc.connect(searchGain);
            searchGain.connect(audioCtx.destination);
            searchOsc.start();

            audioStarted = true;
            startBtn.innerText = "SENSORS ONLINE";
            startBtn.classList.replace('bg-blue-600', 'bg-green-700');
            startBtn.disabled = true;
            log("Audio engine started.");
        } catch(e) { log("Audio Error: " + e.message); }
    }

    function playBubblePop() {
        if (!audioCtx) return;
        const t0 = audioCtx.currentTime;

        // A short filtered noise burst with a quick envelope = "bubble pop".
        const noiseBuffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.06), audioCtx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
            // Slightly decaying noise
            const a = 1 - i / data.length;
            data[i] = (Math.random() * 2 - 1) * a;
        }

        const noise = audioCtx.createBufferSource();
        noise.buffer = noiseBuffer;

        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.setValueAtTime(900, t0);
        bp.Q.setValueAtTime(8, t0);

        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.0, t0);
        gain.gain.linearRampToValueAtTime(0.18, t0 + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.06);

        // Tiny "chirp" for satisfaction.
        const chirp = audioCtx.createOscillator();
        chirp.type = 'sine';
        chirp.frequency.setValueAtTime(700, t0);
        chirp.frequency.exponentialRampToValueAtTime(220, t0 + 0.05);
        const chirpGain = audioCtx.createGain();
        chirpGain.gain.setValueAtTime(0.0001, t0);
        chirpGain.gain.exponentialRampToValueAtTime(0.06, t0 + 0.008);
        chirpGain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.05);

        noise.connect(bp);
        bp.connect(gain);
        gain.connect(audioCtx.destination);

        chirp.connect(chirpGain);
        chirpGain.connect(audioCtx.destination);

        noise.start(t0);
        chirp.start(t0);
        noise.stop(t0 + 0.07);
        chirp.stop(t0 + 0.06);
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });

    hands.onResults(onResults);

    async function setupCamera() {
        log("Requesting camera access...");
        errorMsg.classList.add('hidden');
        
        const isLocalhost =
            location.hostname === 'localhost' ||
            location.hostname === '127.0.0.1' ||
            location.hostname === '[::1]';

        // Opening the HTML directly as file:// will not allow camera permissions.
        if (location.protocol === 'file:') {
            log("Blocked: running from file://");
            errorMsg.innerText =
                "Camera is blocked when you open the HTML as a file (file://).\n\n" +
                "Fix: run a local server and open http://localhost, or deploy to HTTPS.";
            errorMsg.classList.remove('hidden');
            return;
        }

        // Camera permissions require a "secure context" (HTTPS or localhost).
        if (!window.isSecureContext && !isLocalhost) {
            log(`Blocked: insecure context (${location.protocol}//${location.host}).`);
            errorMsg.innerText =
                "Camera blocked by browser security: this page is not in a secure context.\n\n" +
                "Fix: use HTTPS (Netlify/GitHub Pages) or run on http://localhost.\n" +
                `Current: ${location.protocol}//${location.host}`;
            errorMsg.classList.remove('hidden');
            return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            log("Error: MediaDevices not found.");
            errorMsg.innerText =
                "Camera API not available in this browser/context.\n\n" +
                "Use Chrome/Edge and open the page from localhost or HTTPS.";
            errorMsg.classList.remove('hidden');
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480 } 
            });
            log("Camera stream acquired.");
            videoElement.srcObject = stream;
            
            videoElement.onloadedmetadata = async () => {
                try {
                    await videoElement.play();
                } catch (e) {
                    log("Video play blocked: " + (e?.name || e?.message || String(e)));
                }
                cameraActive = true;
                statusDot.style.backgroundColor = '#3b82f6';
                statusText.innerText = "Camera Active";
                permBtn.classList.add('hidden');
                startBtn.disabled = false;
                startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                startBtn.classList.add('bg-blue-600');
                log("Video playing, starting loop.");
                processVideo();
            };
        } catch (err) {
            log("Camera Error: " + (err?.name || "Unknown"));
            statusDot.style.backgroundColor = '#ef4444';
            const details = `${err?.name || "Unknown"}${err?.message ? ": " + err.message : ""}`;
            errorMsg.innerText =
                "Camera Error (" + details + ").\n\n" +
                "Common fixes:\n" +
                "- Use HTTPS (or http://localhost)\n" +
                "- Click 'Allow' in the browser prompt\n" +
                "- Close other apps using the camera (Zoom/Teams)\n" +
                "- Check site permissions in browser settings";
            errorMsg.classList.remove('hidden');
        }
    }

    async function processVideo() {
        if (cameraActive && videoElement.readyState >= 2) {
            try {
                await hands.send({ image: videoElement });
            } catch (e) {}
        }
        requestAnimationFrame(processVideo);
    }

    permBtn.onclick = setupCamera;
    startBtn.onclick = initAudio;

    function createTarget() {
        return {
            x: Math.random() * (canvasElement.width - 100) + 50,
            y: Math.random() * (canvasElement.height - 100) + 50,
            size: 40 + Math.random() * 30,
            color: `hsl(${Math.random() * 360}, 70%, 50%)`
        };
    }

    function initTargets() {
        targets = [];
        for(let i = 0; i < 3; i++) targets.push(createTarget());
    }

    function resize() {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    initTargets();

    function onResults(results) {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            handDetected = true;
            statusDot.style.backgroundColor = '#22c55e';
            statusText.innerText = "Tracking Hand";
            
            const landmarks = results.multiHandLandmarks[0];
            const currentX = 1 - landmarks[9].x; 
            const currentY = landmarks[9].y;

            handPos.x = handPos.x * 0.7 + currentX * 0.3;
            handPos.y = handPos.y * 0.7 + currentY * 0.3;

            const dist = Math.sqrt(Math.pow(currentX - lastHandPos.x, 2) + Math.pow(currentY - lastHandPos.y, 2));
            jitter = jitter * 0.8 + dist * 0.2;
            lastHandPos = { x: currentX, y: currentY };

            const wrist = landmarks[0];
            const indexTip = landmarks[8];
            const midTip = landmarks[12];
            const d8 = Math.sqrt(Math.pow(indexTip.x - wrist.x, 2) + Math.pow(indexTip.y - wrist.y, 2));
            const d12 = Math.sqrt(Math.pow(midTip.x - wrist.x, 2) + Math.pow(midTip.y - wrist.y, 2));
            
            isFist = (d8 < 0.14 && d12 < 0.14); 
            
            if (isFist && !wasFist) {
                const aimX = handPos.x * canvasElement.width;
                const aimY = handPos.y * canvasElement.height;
                let hit = false;
                targets.forEach((t, index) => {
                    const d = Math.sqrt(Math.pow(aimX - t.x, 2) + Math.pow(aimY - t.y, 2));
                    if (d < t.size) {
                        hit = true;
                        playBubblePop();
                        targets[index] = createTarget();
                        score += 100;
                        scoreDisplay.innerText = `Score: ${score}`;
                    }
                });
                if (!hit) {
                    score -= 50;
                    scoreDisplay.innerText = `Score: ${score}`;
                }
            }
            wasFist = isFist;
        } else {
            handDetected = false;
        }
    }

    function draw() {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        targets.forEach(t => {
            canvasCtx.fillStyle = t.color;
            canvasCtx.beginPath();
            canvasCtx.arc(t.x, t.y, t.size, 0, Math.PI * 2);
            canvasCtx.fill();
        });
        const aimX = handPos.x * canvasElement.width;
        const aimY = handPos.y * canvasElement.height;

        // Used for eyes-closed play: "on-target" audio cue.
        const aimingAtTarget = targets.some(t => {
            const d = Math.sqrt(Math.pow(aimX - t.x, 2) + Math.pow(aimY - t.y, 2));
            return d < t.size;
        });

        canvasCtx.strokeStyle = isFist ? '#ef4444' : '#3b82f6';
        canvasCtx.lineWidth = 3;
        canvasCtx.beginPath();
        canvasCtx.arc(aimX, aimY, isFist ? 15 : 25, 0, Math.PI * 2);
        canvasCtx.stroke();
        if (audioStarted) {
            // Slower, gentler modulation (less annoying).
            const base = aimingAtTarget ? 520 : 160;
            const span = aimingAtTarget ? 900 : 800;
            const max = aimingAtTarget ? 1400 : 520;
            const freq = base + (jitter * span);
            jitterOsc.frequency.setTargetAtTime(Math.min(freq, max), audioCtx.currentTime, 0.12);

            // Slightly louder/brighter when on-target so you can "lock on" with eyes closed.
            const targetGain = handDetected ? (aimingAtTarget ? 0.028 : 0.02) : 0.0;
            jitterGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.12);

            // Distinct cue layers for eyes-closed play:
            // - lockGain: only when aiming at a target (and hand is detected)
            // - searchGain: only when NO hand is detected (out of frame)
            if (lockGain) {
                lockGain.gain.setTargetAtTime(handDetected && aimingAtTarget ? 0.012 : 0.0, audioCtx.currentTime, 0.08);
            }
            if (searchGain) {
                searchGain.gain.setTargetAtTime(!handDetected ? 0.010 : 0.0, audioCtx.currentTime, 0.15);
            }

            if (jitterFilter) {
                const cutoffBase = aimingAtTarget ? 1200 : 420;
                const cutoffSpan = aimingAtTarget ? 2400 : 1200;
                const cutoff = cutoffBase + (jitter * cutoffSpan);
                jitterFilter.frequency.setTargetAtTime(Math.min(cutoff, 3000), audioCtx.currentTime, 0.12);
            }
        }
        requestAnimationFrame(draw);
    }

    // Start the render loop immediately; camera starts after user click.
    draw();
</script>
